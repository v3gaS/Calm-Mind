      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#080a16" stop-opacity="0"/>
