  <rect x="580" y="28" width="112" height="26" rx="12" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-opacity="0.4"/>
  <text x="592" y="46" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="11" letter-spacing="0.06em">SYNTHESIZING</text>
