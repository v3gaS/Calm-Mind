<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Therapy System</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-4">Audio Therapy System</h1>
            <p class="text-gray-400">Advanced sound generation for mental wellbeing</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Sound Generator Controls -->
            <div class="bg-gray-800 rounded-lg p-6">
                <h2 class="text-2xl font-semibold mb-6">Sound Generator</h2>
                
                <!-- Generator Type Selection -->
                <div class="mb-6">
                    <label class="block text-gray-400 mb-2">Generator Type</label>
                    <select id="generatorType" class="w-full bg-gray-700 rounded px-3 py-2">
                        <option value="binaural">Binaural Beats</option>
                        <option value="solfeggio">Solfeggio Frequencies</option>
                        <option value="monaural">Monaural Beats</option>
                        <option value="isochronic">Isochronic Tones</option>
                        <option value="ambient">Ambient Sounds</option>
                    </select>
                </div>

                <!-- Frequency Controls -->
                <div class="mb-6">
                    <label class="block text-gray-400 mb-2">Carrier Frequency (Hz)</label>
                    <input type="range" id="carrierFreq" min="20" max="1000" value="440" 
                           class="w-full bg-gray-700 rounded-lg appearance-none h-3">
                    <span id="carrierFreqValue" class="text-sm text-gray-400">440 Hz</span>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-400 mb-2">Beat Frequency (Hz)</label>
                    <input type="range" id="beatFreq" min="0.5" max="40" value="10" step="0.5"
                           class="w-full bg-gray-700 rounded-lg appearance-none h-3">
                    <span id="beatFreqValue" class="text-sm text-gray-400">10 Hz</span>
                </div>

                <!-- Volume Control -->
                <div class="mb-6">
                    <label class="block text-gray-400 mb-2">Volume</label>
                    <input type="range" id="volume" min="0" max="1" value="0.5" step="0.01"
                           class="w-full bg-gray-700 rounded-lg appearance-none h-3">
                </div>

                <!-- Effect Controls -->
                <div class="mb-6">
                    <label class="block text-gray-400 mb-2">Effects</label>
                    <div class="flex space-x-4">
                        <label class="inline-flex items-center">
                            <input type="checkbox" id="reverbEffect" class="form-checkbox">
                            <span class="ml-2">Reverb</span>
                        </label>
                    </div>
                </div>

                <!-- Playback Controls -->
                <div class="flex justify-center space-x-4">
                    <button id="playButton" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg">
                        Play
                    </button>
                    <button id="stopButton" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-lg">
                        Stop
                    </button>
                </div>
            </div>

            <!-- Visualization -->
            <div class="bg-gray-800 rounded-lg p-6">
                <h2 class="text-2xl font-semibold mb-6">Visualization</h2>
                <canvas id="visualizer" class="w-full h-64 bg-black rounded-lg"></canvas>
                
                <div class="mt-4">
                    <label class="block text-gray-400 mb-2">Visualization Type</label>
                    <select id="visType" class="w-full bg-gray-700 rounded px-3 py-2">
                        <option value="waveform">Waveform</option>
                        <option value="frequency">Frequency Spectrum</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Session Info -->
        <div class="mt-8 bg-gray-800 rounded-lg p-6">
            <h2 class="text-2xl font-semibold mb-4">Current Session</h2>
            <div id="sessionInfo" class="text-gray-400">
                No active session
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
